<div class="table-wrapper" role="region" aria-label="Listado de clientes" tabindex="0">
  @if (loading()) {
    <div class="table__loading" aria-live="polite" aria-busy="true">
      <div class="table__spinner"></div>
      <span class="sr-only">Cargando cuentas…</span>
    </div>
  } @else {
    <table class="table" aria-label="Clientes">
      <thead class="table__head">
      <tr>
        <th scope="col" class="table__th table__th--action"></th>
        <th scope="col" class="table__th">Número de Cuenta</th>
        <th scope="col" class="table__th">Tipo Cuenta</th>
        <th scope="col" class="table__th">Balance</th>
        <th scope="col" class="table__th">Estado</th>
      </tr>
      </thead>
      <tbody class="table__body">
        @for (account of accounts(); track account.accountId) {
          <tr class="table__row">
            <td class="table__td table__td--action">
              <button
                class="table__btn-delete"
                (click)="deleteAccount.emit(account.accountId)"
                [attr.aria-label]="'Eliminar cuenta ' + account.accountNumber"
                title="Eliminar"
              >✕</button>
            </td>
            <td class="table__td table__td--mono">{{ account.accountNumber }}</td>
            <td class="table__td table__td--mono">{{ account.description }}</td>
            <td class="table__td table__td--mono">{{ account.amount | currency:'USD' }}</td>
            <td class="table__td table__td--mono">
              <span class="badge badge--{{ account.status }}">
                {{ account.status }}
              </span>
            </td>
          </tr>
        } @empty {
          <tr>
            <td class="table__empty" colspan="5">Sin resultados</td>
          </tr>
        }
      </tbody>
    </table>

    <div class="table-pagination">
      <app-pagination
        [totalItems]="totalAccounts()"
        [pageSize]="pageSize()"
        [currentPage]="currentPage()"
        (pageChange)="pageChange.emit($event)"
      />
    </div>
  }
</div>
