spring.application.name=devsu-api-bank
server.servlet.context-path=/${spring.application.name}

spring.datasource.url=jdbc:sqlserver://${DB_HOST:sqlserverbank}:${DB_PORT:1433};DatabaseName=${DB_NAME:devsu_bank};encrypt=true;trustServerCertificate=true;
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:MiContraseña_Segura123!}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
